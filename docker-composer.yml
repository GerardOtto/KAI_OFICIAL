services:

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 365153gg
      POSTGRES_DB: KAI-PROJECT
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/backup.sql:/docker-entrypoint-initdb.d/backup.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:365153gg@db:5432/KAI-PROJECT
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend/kai-project
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: